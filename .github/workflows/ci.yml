name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    env:
      HUSKY: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint:ts

      - name: Stylelint
        run: npm run lint:css

      - name: Tests
        run: npm run test

      - name: Production build
        run: npm run build
